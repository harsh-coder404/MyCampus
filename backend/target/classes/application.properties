spring.application.name=mycampus-backend
server.port=${SERVER_PORT:8080}

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mycampus}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT secrets (must be 32+ chars for HS256 key)
app.jwt.access-secret=${JWT_ACCESS_SECRET:mycampus-access-secret-key-123456789012}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET:mycampus-refresh-secret-key-1234567890}
app.jwt.access-expiry-minutes=${JWT_ACCESS_MINUTES:120}
app.jwt.refresh-expiry-days=${JWT_REFRESH_DAYS:30}


